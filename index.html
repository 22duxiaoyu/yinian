<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="一念是一个本地优先的碎片日记与灵感收集工具。"
        />
        <title>一念 - 碎片日记</title>
        <link rel="stylesheet" href="./styles.css" />
    </head>
    <body>
        <svg aria-hidden="true" class="icon-sprite">
            <symbol id="icon-plus" viewBox="0 0 24 24">
                <path d="M12 5v14M5 12h14" />
            </symbol>
            <symbol id="icon-search" viewBox="0 0 24 24">
                <path d="m21 21-4.3-4.3" />
                <circle cx="11" cy="11" r="7" />
            </symbol>
            <symbol id="icon-pin" viewBox="0 0 24 24">
                <path d="M12 17v5" />
                <path
                    d="M7 3h10l-1.7 7.5 2.7 2.7V15H6v-1.8l2.7-2.7L7 3Z"
                />
            </symbol>
            <symbol id="icon-archive" viewBox="0 0 24 24">
                <path d="M4 7h16" />
                <path d="M6 7v12h12V7" />
                <path d="M9 11h6" />
                <path d="M5 3h14l1 4H4l1-4Z" />
            </symbol>
            <symbol id="icon-trash" viewBox="0 0 24 24">
                <path d="M4 7h16" />
                <path d="M10 11v6M14 11v6" />
                <path d="M6 7l1 14h10l1-14" />
                <path d="M9 7V4h6v3" />
            </symbol>
            <symbol id="icon-download" viewBox="0 0 24 24">
                <path d="M12 3v12" />
                <path d="m7 10 5 5 5-5" />
                <path d="M5 21h14" />
            </symbol>
            <symbol id="icon-upload" viewBox="0 0 24 24">
                <path d="M12 21V9" />
                <path d="m7 14 5-5 5 5" />
                <path d="M5 3h14" />
            </symbol>
            <symbol id="icon-spark" viewBox="0 0 24 24">
                <path d="M13 2 9.5 9.5 2 13l7.5 3.5L13 24l3.5-7.5L24 13l-7.5-3.5L13 2Z" />
            </symbol>
            <symbol id="icon-clock" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="9" />
                <path d="M12 7v5l3 2" />
            </symbol>
            <symbol id="icon-edit" viewBox="0 0 24 24">
                <path d="M12 20h9" />
                <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4 11.5-11.5Z" />
            </symbol>
            <symbol id="icon-x" viewBox="0 0 24 24">
                <path d="M18 6 6 18" />
                <path d="m6 6 12 12" />
            </symbol>
            <symbol id="icon-calendar" viewBox="0 0 24 24">
                <path d="M8 2v4M16 2v4" />
                <path d="M4 9h16" />
                <path d="M5 5h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Z" />
            </symbol>
            <symbol id="icon-activity" viewBox="0 0 24 24">
                <path d="M3 12h4l3-8 4 16 3-8h4" />
            </symbol>
        </svg>

        <section class="auth-screen" id="authScreen" aria-label="登录一念">
            <div class="auth-panel">
                <div class="brand auth-brand">
                    <div class="brand-mark" aria-hidden="true">
                        <span></span>
                    </div>
                    <div>
                        <p class="brand-title">一念</p>
                        <p class="brand-subtitle">进入你的记录空间</p>
                    </div>
                </div>
                <p class="eyebrow">
                    <svg><use href="#icon-spark" /></svg>
                    本地账户
                </p>
                <h1>把碎片想法，放进自己的空间。</h1>
                <form class="auth-form" id="authForm">
                    <label>
                        <span>用户名</span>
                        <input
                            id="authName"
                            autocomplete="username"
                            maxlength="32"
                            placeholder="例如 lichao"
                            required
                        />
                    </label>
                    <label>
                        <span>访问码</span>
                        <input
                            id="authPasscode"
                            autocomplete="current-password"
                            minlength="4"
                            placeholder="至少 4 位"
                            required
                            type="password"
                        />
                    </label>
                    <button class="primary-button auth-submit" type="submit">
                        <svg><use href="#icon-plus" /></svg>
                        进入一念
                    </button>
                </form>
                <p class="auth-message" id="authMessage">
                    没有账户会自动创建本地空间。
                </p>
            </div>
        </section>

        <div class="app-shell">
            <aside class="sidebar" aria-label="一念导航">
                <div class="brand">
                    <div class="brand-mark" aria-hidden="true">
                        <span></span>
                    </div>
                    <div>
                        <p class="brand-title">一念</p>
                        <p class="brand-subtitle">碎片日记</p>
                    </div>
                </div>

                <div class="daily-plate">
                    <div>
                        <span id="todayMonth">--</span>
                        <strong id="todayDay">--</strong>
                    </div>
                    <p id="dailyLine">把脑子里的光，先放到纸上。</p>
                </div>

                <nav class="nav-list" aria-label="记录筛选">
                    <button class="nav-item active" data-filter="all">
                        全部
                        <span id="countAll">0</span>
                    </button>
                    <button class="nav-item" data-filter="today">
                        今天
                        <span id="countToday">0</span>
                    </button>
                    <button class="nav-item" data-filter="idea">
                        灵感
                        <span id="countIdea">0</span>
                    </button>
                    <button class="nav-item" data-filter="diary">
                        日记
                        <span id="countDiary">0</span>
                    </button>
                    <button class="nav-item" data-filter="review">
                        复盘
                        <span id="countReview">0</span>
                    </button>
                    <button class="nav-item" data-filter="task">
                        待办
                        <span id="countTask">0</span>
                    </button>
                    <button class="nav-item" data-filter="archived">
                        归档
                        <span id="countArchived">0</span>
                    </button>
                </nav>

                <section class="sidebar-section">
                    <div class="section-heading">
                        <span>常用标签</span>
                        <button class="icon-button" id="clearTag" title="清除标签">
                            <span class="sr-only">清除标签</span>
                            <svg><use href="#icon-trash" /></svg>
                        </button>
                    </div>
                    <div class="tag-cloud" id="tagCloud"></div>
                </section>

                <section class="sidebar-section stats">
                    <div>
                        <strong id="statStreak">0</strong>
                        <span>连续记录</span>
                    </div>
                    <div>
                        <strong id="statWords">0</strong>
                        <span>累计字数</span>
                    </div>
                </section>

                <section class="sidebar-section storage-card">
                    <span>当前空间</span>
                    <strong id="spaceName">未登录</strong>
                    <p id="spaceMeta">浏览器本地保存</p>
                </section>
            </aside>

            <main class="workspace">
                <header class="topbar">
                    <div>
                        <p class="eyebrow">
                            <svg><use href="#icon-spark" /></svg>
                            今日捕捉
                        </p>
                        <h1 id="workspaceTitle">今天有什么值得留下？</h1>
                        <p class="workspace-subtitle" id="workspaceSubtitle">
                            记录想法、复盘和待办，沉淀成自己的私人时间线。
                        </p>
                    </div>
                    <div class="topbar-actions">
                        <div class="time-pill" id="timePill">
                            <svg><use href="#icon-clock" /></svg>
                            <span>--:--</span>
                        </div>
                        <div class="user-chip" id="userChip" hidden>
                            <span id="userInitial">一</span>
                            <strong id="activeUserName">本地用户</strong>
                            <button id="logoutButton" type="button">退出</button>
                        </div>
                        <button class="tool-button" id="exportNotes">
                            <svg><use href="#icon-download" /></svg>
                            导出
                        </button>
                        <label class="tool-button file-button">
                            <svg><use href="#icon-upload" /></svg>
                            导入
                            <input
                                id="importNotes"
                                type="file"
                                accept="application/json"
                            />
                        </label>
                    </div>
                </header>

                <section class="overview-grid" aria-label="今日概览">
                    <article class="focus-card">
                        <div class="overview-heading">
                            <span>最近更新</span>
                            <strong id="focusType">记录</strong>
                        </div>
                        <h2 id="focusTitle">还没有记录</h2>
                        <p id="focusExcerpt">写下第一条内容后，这里会显示最近一次更新。</p>
                    </article>

                    <article class="metric-card">
                        <span>今日记录</span>
                        <strong id="metricToday">0</strong>
                        <small>条</small>
                    </article>

                    <article class="metric-card">
                        <span>本周积累</span>
                        <strong id="metricWeek">0</strong>
                        <small>条</small>
                    </article>

                    <article class="metric-card">
                        <span>置顶内容</span>
                        <strong id="metricPinned">0</strong>
                        <small>条</small>
                    </article>

                    <article class="activity-card">
                        <div class="overview-heading">
                            <span>七天节奏</span>
                            <strong id="weekRange">--</strong>
                        </div>
                        <div class="activity-strip" id="activityStrip"></div>
                    </article>
                </section>

                <section class="composer-section" aria-label="新建记录">
                    <form class="composer" id="noteForm">
                        <div class="composer-head">
                            <div>
                                <p>快速记录</p>
                                <strong id="captureStatus">空白草稿</strong>
                            </div>
                            <div class="composer-meter" aria-hidden="true">
                                <span id="moodIndicator"></span>
                            </div>
                        </div>
                        <div class="composer-grid">
                            <label>
                                <span>标题</span>
                                <input
                                    id="noteTitle"
                                    maxlength="60"
                                    placeholder="给这条想法起个名字"
                                />
                            </label>
                            <label>
                                <span>类型</span>
                                <select id="noteType">
                                    <option value="idea">灵感</option>
                                    <option value="diary">日记</option>
                                    <option value="review">复盘</option>
                                    <option value="task">待办</option>
                                </select>
                            </label>
                            <label>
                                <span>状态</span>
                                <select id="noteMood">
                                    <option value="清醒">清醒</option>
                                    <option value="开心">开心</option>
                                    <option value="卡住">卡住</option>
                                    <option value="松弛">松弛</option>
                                </select>
                            </label>
                        </div>
                        <label>
                            <span>内容</span>
                            <textarea
                                id="noteContent"
                                rows="6"
                                placeholder="写一句也行。想法、复盘、灵感、待办都可以放进来。"
                                required
                            ></textarea>
                        </label>
                        <div class="composer-footer">
                            <input
                                id="noteTags"
                                placeholder="标签，用逗号分隔，例如 产品,灵感"
                            />
                            <span class="live-words" id="liveWords">0 字</span>
                            <button class="ghost-button" id="cancelEdit" type="button" hidden>
                                <svg><use href="#icon-x" /></svg>
                                取消
                            </button>
                            <button class="primary-button" type="submit">
                                <svg><use href="#icon-plus" /></svg>
                                <span id="submitLabel">记录</span>
                            </button>
                        </div>
                    </form>

                    <div class="template-row" aria-label="快速模板">
                        <button data-template="diary">今日片段</button>
                        <button data-template="idea">产品灵感</button>
                        <button data-template="review">晚间复盘</button>
                        <button data-template="task">三件事</button>
                    </div>
                </section>

                <section class="list-panel" aria-label="记录库">
                    <div class="list-panel-head">
                        <div>
                            <p class="eyebrow">
                                <svg><use href="#icon-calendar" /></svg>
                                记录库
                            </p>
                            <h2 id="resultTitle">全部记录</h2>
                            <p id="resultMeta">正在加载时间线</p>
                        </div>
                        <span class="filter-chip" id="activeScope">全部</span>
                    </div>

                    <div class="list-toolbar" aria-label="搜索记录">
                        <div class="search-box">
                            <svg><use href="#icon-search" /></svg>
                            <input
                                id="searchInput"
                                placeholder="搜索标题、内容或标签"
                                autocomplete="off"
                            />
                        </div>
                        <select id="sortSelect" aria-label="排序">
                            <option value="newest">最新优先</option>
                            <option value="oldest">最早优先</option>
                            <option value="longest">内容最长</option>
                        </select>
                    </div>
                </section>

                <section class="timeline" id="timeline" aria-live="polite"></section>
            </main>
        </div>

        <div class="toast" id="toast" role="status" aria-live="polite"></div>

        <script src="./app.js"></script>
    </body>
</html>
