project_id = "action-cloud"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://22duxiaoyu.github.io/yinian/"
additional_redirect_urls = ["http://localhost:6002/**", "http://127.0.0.1:6002/**", "https://22duxiaoyu.github.io/yinian/**"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "60s"
otp_length = 6
otp_expiry = 600

[auth.email.template.confirmation]
subject = "{{ .Token }} 是你的 Action 验证码"
content_path = "./supabase/templates/confirmation.html"

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[storage]
enabled = true
file_size_limit = "20MiB"

[functions.analyze-insights]
verify_jwt = true

[functions.generate-weekly]
verify_jwt = true

[functions.ask-action]
verify_jwt = true

[functions.admin-analytics]
verify_jwt = true
