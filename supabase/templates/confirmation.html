<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Action 邮箱验证</title>
  </head>
  <body style="margin:0;background:#edf2f5;color:#17212b;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:40px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background:#ffffff;border:1px solid #dce4e9;border-radius:16px;padding:36px;">
            <tr>
              <td>
                <p style="margin:0 0 28px;font-size:18px;font-weight:700;">Action</p>
                <h1 style="margin:0 0 12px;font-size:28px;line-height:1.35;">验证你的邮箱</h1>
                <p style="margin:0 0 28px;color:#66727d;font-size:15px;line-height:1.7;">请在注册页面输入下面的六位验证码。验证码十分钟内有效。</p>
                <div style="padding:20px 16px;background:#f2f6f8;border-radius:12px;text-align:center;font-size:34px;font-weight:700;letter-spacing:10px;color:#17212b;">{{ .Token }}</div>
                <p style="margin:28px 0 0;color:#8a959e;font-size:13px;line-height:1.6;">如果不是你本人操作，可以忽略这封邮件。</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
